services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fyp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-fyp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fyp}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/backend:latest
    pull_policy: always
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fyp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fyp}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/frontend:latest
    pull_policy: always
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
